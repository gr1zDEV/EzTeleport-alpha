site_name: EzTeleport Docs
site_description: Server owner and player documentation for EzTeleport
site_url: https://ez-innovations.github.io/EzTeleport-alpha/
repo_url: https://github.com/ez-innovations/EzTeleport-alpha
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top

nav:
  - Home: index.md
  - Installation & Upgrade: installation-and-upgrades.md
  - Command Configuration: command-configuration.md
  - Operations Runbook: operations-runbook.md
  - Player Commands: player-commands.md
  - Troubleshooting: troubleshooting.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
