site_name: EzTeleport Docs
site_description: Server owner and player documentation for EzTeleport
site_url: https://ez-innovations.github.io/EzTeleport-alpha/
repo_url: https://github.com/ez-innovations/EzTeleport-alpha
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top

nav:
  - Getting Started:
      - Installing EzTeleport: installation-and-upgrades.md
      - Supported Plugins: supported-plugins.md
  - Configuration: command-configuration.md
  - Commands & Permissions: commands-and-permissions.md
  - FAQ: faq.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
